# ── General ──────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g status-position top
set -g status-right-length 200

# ── Vi mode ──────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Pane navigation (hjkl) ───────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Splits & windows ────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Reload config ───────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Step 1: Catppuccin options ──────────────
if-shell '[ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ]' {
  set -g @catppuccin_flavor "frappe"
} {
  set -g @catppuccin_flavor "latte"
}
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_text " %H:%M"

# ── Step 2: Load catppuccin (sets @catppuccin_status_* vars) ──
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

# ── Step 3: Status bar (-gF/-agF expands vars, exposes plugin placeholders) ──
set -gF  status-left "#{E:@catppuccin_status_session}"
set -gF  status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_load}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#{E:@catppuccin_status_user}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# ── Step 4: TPM last (battery/cpu scan status-right and interpolate) ──
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
run '~/.config/tmux/plugins/tpm/tpm'

# ── Live theme switch on focus ──────────────
set-hook -g client-focus-in "run-shell -b '~/.config/tmux/scripts/auto-theme.sh'"
