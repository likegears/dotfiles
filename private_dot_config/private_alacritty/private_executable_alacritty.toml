# ── Theme ─────────────────────────────────────
# Alacritty doesn't auto-detect dark/light, use theme-switch.sh
[general]
import = ["~/.config/alacritty/catppuccin-frappe.toml"]

# ── Font ──────────────────────────────────────
[font]
size = 16.0

[font.normal]
family = "3270 Nerd Font Mono"
style = "Regular"

[font.bold]
family = "3270 Nerd Font Mono"
style = "Bold"

[font.italic]
family = "3270 Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "3270 Nerd Font Mono"
style = "Bold Italic"

# ── Window ────────────────────────────────────
[window]
decorations = "Buttonless"
opacity = 0.6
blur = true
padding = { x = 4, y = 2 }
dynamic_padding = true

# ── Cursor ────────────────────────────────────
[cursor.style]
shape = "Block"
blinking = "On"

[cursor]
thickness = 0.2
unfocused_hollow = true
blink_interval = 550
blink_timeout = 0

# ── Selection ─────────────────────────────────
[selection]
save_to_clipboard = true

# ── Mouse ─────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Scrolling ─────────────────────────────────
[scrolling]
history = 50000
