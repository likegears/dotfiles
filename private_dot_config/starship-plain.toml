"$schema" = 'https://starship.rs/config-schema.json'

# Plain prompt — NO Nerd Font, NO Powerline symbols
# Pure ASCII/Unicode for terminals without special fonts

format = """
$os\
${env_var.STARSHIP_SHELL_DISPLAY}\
 $username$hostname$sudo\
 $directory\
 $git_branch$git_status$git_state\
 $c$rust$golang$nodejs$python$lua\
 $docker_context$package$gcloud\
$line_break$character\
"""

right_format = """
$status$jobs $cmd_duration $time\
"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'
color_magenta = '#b16286'

[os]
disabled = false
format = '[$symbol]($style)'
style = "bold color_magenta"

[os.symbols]
Macos = "mac"
Windows = "win"
Ubuntu = "ubu"
Linux = "lnx"
Fedora = "fed"
Arch = "arc"
Debian = "deb"

[env_var.STARSHIP_SHELL_DISPLAY]
format = '[$env_value](color_magenta)'

[username]
show_always = false
format = '[$user](bold color_orange)'

[hostname]
ssh_only = true
ssh_symbol = "@"
format = '[$ssh_symbol$hostname](bold color_orange)'
aliases = { "192.168.1.77" = "4090" }

[sudo]
disabled = false
symbol = "(sudo)"
format = '[$symbol](bold color_red)'

[directory]
truncation_length = 5
truncation_symbol = ".../"
truncate_to_repo = true
home_symbol = "~"
read_only = " ro"
format = '[$path]($style)[$read_only]($read_only_style)'
style = "bold color_yellow"

[git_branch]
truncation_length = 30
symbol = ""
format = '[$branch](color_aqua)'

[git_status]
format = '([$all_status$ahead_behind](color_aqua))'
conflicted = "="
ahead = "^"
behind = "v"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "*"
modified = "!"
staged = "+"
renamed = ">"
deleted = "x"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY"
bisect = "BISECT"
format = '($state $progress_current/$progress_total)'

[nodejs]
symbol = "node:"
format = '[$symbol$version](color_blue) '

[c]
symbol = "c:"
format = '[$symbol$version](color_blue) '

[rust]
symbol = "rs:"
format = '[$symbol$version](color_blue) '

[golang]
symbol = "go:"
format = '[$symbol$version](color_blue) '

[python]
symbol = "py:"
format = '[$symbol$version(\($virtualenv\))](color_blue) '

[lua]
symbol = "lua:"
format = '[$symbol$version](color_blue) '

[docker_context]
symbol = "docker:"
format = '[$symbol$context](color_bg3) '

[package]
symbol = "pkg:"
format = '[$symbol$version](color_bg3) '

[gcloud]
symbol = "gcp:"
detect_env_vars = ['GOOGLE_CLOUD_PROJECT', 'GCLOUD_PROJECT', 'CLOUDSDK_ACTIVE_CONFIG_NAME']
format = '[$symbol$account](color_bg3) '

[status]
disabled = false
format = '[$symbol$status](bold red) '

[jobs]
disabled = false
number_threshold = 1
format = '[&$number](bold color_aqua) '

[cmd_duration]
disabled = false
min_time = 2000
format = '[$duration](color_blue)'

[time]
disabled = false
time_format = "%H:%M"
format = ' [$time](color_aqua)'

[line_break]
disabled = false

[character]
success_symbol = '[>](bold color_aqua)'
error_symbol = '[>](bold color_red)'
vimcmd_symbol = '[<](bold color_aqua)'
