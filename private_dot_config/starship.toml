# detect_env_vars = [  ]
format = '[ $user ]($style)'
aliases = {"root" = "sudo"}

[directory]
disabled = false
truncation_length = 15
truncation_symbol = "¯®╝/"
truncate_to_repo = true
read_only = "´Çú "
read_only_style ="red"
style = "fg:color_fg0 bg:color_yellow"
