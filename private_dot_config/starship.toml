# ÔöÇÔöÇ Right side: bg3 segment (system status) ÔöÇÔöÇÔöÇ

[status]
disabled = false
map_symbol = false
recognize_signal_code = true
pipestatus = true
symbol = '¾░àù '
not_found_symbol = '¾░ıë '
not_executable_symbol = '¾░îğ '
sigint_symbol = '¾░£║ '
signal_symbol = '¾▒Éï '
format = '[ $symbol$common_meaning$signal_name$maybe_int ](bold red bg:color_bg3)'

[jobs]
disabled = false
symbol = '¾░£Ş '
number_threshold = 1
symbol_threshold = 1
format = '[ $symbol$number ](bold color_aqua bg:color_bg3)'

[localip]
disabled = false
ssh_only = true
format = '[ $localipv4 ](fg:color_fg0 bg:color_bg3)'

[battery]
disabled = false
full_symbol = '¾░éä '
charging_symbol = '¾░éä '
discharging_symbol = '¾░éâ '
unknown_symbol = '¾░éæ '
empty_symbol = '¾░éÄ '
format = '[$symbol$percentage ](fg:color_fg0 bg:color_blue)'

[[battery.display]]
threshold = 20
style = "bold red bg:color_blue"
discharging_symbol = '¾░ü║ '

[[battery.display]]
threshold = 100
style = "fg:color_fg0 bg:color_blue"

[memory_usage]
disabled = false
threshold = 0
symbol = '¾░ıø '
format = '[$symbol${ram_pct} ](fg:color_fg0 bg:color_aqua)'

[custom.cpu]
command = "ps -A -o %cpu | awk '{s+=$1} END {printf \"%.0f%%\", s/4}'"
when = true
symbol = '¾░İÜ '
format = '[$symbol($output) ](fg:color_fg0 bg:color_yellow)'


# ÔöÇÔöÇ Right side: blue segment (timing) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[cmd_duration]
disabled = false
min_time = 2000
show_milliseconds = true
show_notifications = false
format = '[[ ´öá$duration ](fg:color_fg0 bg:color_orange)]($style)'
style = "bg:color_orange"

# ÔöÇÔöÇ Right side: aqua segment (clock) ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[time]
disabled = false
time_format = "%H:%M"
style = "bg:color_magenta"
format = '[[ ¯Öü $time ](fg:color_fg0 bg:color_magenta)]($style)'

# ÔöÇÔöÇ Prompt ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

