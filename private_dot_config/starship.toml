# ÔöÇÔöÇ User & Host ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[username]
show_always = false
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'
aliases = { "root" = "sudo" }

[hostname]
ssh_only = true
ssh_symbol = "¯İí "
trim_at = '.'
detect_env_vars = ['!TMUX', "SSH_CLIENT", "SSH_TTY", "SSH_CONNECTION"]
format = '[$ssh_symbol$hostname ]($style)'
style = "bold bg:color_orange fg:color_fg0"
disabled = false
aliases = { "192.168.1.77" = "4090" }

[sudo]
disabled = false
symbol = "´é£ "
style = "bg:color_orange fg:color_fg0"
format = '[$symbol]($style)'

# ÔöÇÔöÇ Directory ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[directory]
disabled = false
truncation_length = 5
truncation_symbol = "ÔÇĞ/"
truncate_to_repo = true
fish_style_pwd_dir_length = 1
home_symbol = "¾░ï£"
read_only = " ´Çú"
read_only_style = "red"
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"


# ÔöÇÔöÇ Git ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[git_branch]
truncation_length = 30
truncation_symbol = "ÔÇĞ"
symbol = "¯éá"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_commit]
commit_hash_length = 7
only_detached = true
tag_disabled = false
tag_max_candidates = 10
tag_symbol = "´ÉÆ "
style = "bg:color_aqua"
format = '[$tag_symbol $tag \[$hash\]]($style)'

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold yellow bg:color_aqua"
format = '\([$state( $progress_current/$progress_total)]($style)\)'

[git_metrics]
disabled = false
added_style = "bold color_fg0 bg:color_aqua"
deleted_style = "bold red bg:color_aqua"
only_nonzero_diffs = true
format = '[+$added]($added_style)[/](bg:color_aqua)[-$deleted]($deleted_style)'
ignore_submodules = true

[git_status]
style = "bg:color_aqua"
format = '([\[$all_status$ahead_behind\]]($style))'
conflicted = "="
ahead = "[Ôçí](bold color_fg0 bg:color_aqua)"
behind = "[Ôçú](bold red bg:color_aqua)"
diverged = "[Ôçò]"
up_to_date = "[Ô£ô](bold color_fg0 bg:color_aqua)"
untracked = "?"
stashed = "*"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "[Ô£İ](bold red bg:color_aqua)"
typechanged = ""
ignore_submodules = true
disabled = false

# ÔöÇÔöÇ Languages ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[nodejs]
