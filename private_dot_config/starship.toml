# ignore_branches = ["main", "master", "develop", "dev"]
symbol = "´Éÿ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_commit]
commit_hash_length = 7
only_detached = true
tag_disabled = false
tag_max_candidates =0
tag_symbol = "´Ç½ "
style = "bg:color_aqua"
format = '[$tag_symbol $tag \[$hash\]]($style)'

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "bold yellow bg:color_aqua"
format = '\([$state( $progress_current/$progress_total)]($style)\)'

[git_metrics]
disabled = false
added_style = "bold green bg:color_aqua"
deleted_style = "bold red bg:color_aqua"
only_nonzero_diffs = true
format = '[+$added]($added_style)[/](bg:color_aqua)[-$deleted]($deleted_style)'
ignore_submodules = false

[git_status]
style = "bg:color_aqua"
format = '([\[$all_status$ahead_behind\]]($style))'
conflicted = "="
ahead = "[Ôçí](bold green bg:color_aqua)"
behind = "[Ôçú](bold red bg:color_aqua)"
diverged = "[Ôçò]"
up_to_date = "[Ô£ô](bold green bg:color_aqua)"
