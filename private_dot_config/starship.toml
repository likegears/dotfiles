Ubuntu = "¾░òê "
SUSE = "¯İ« "
Raspbian = "¾░É┐ "
Mint = "¾░ú¡ "
Macos = "¾░ÇÁ "
Manjaro = "¯İÆ "
Linux = "¾░î¢"
NixOS = "¯İñ "
Gentoo = "¾░ú¿ "
Fedora = "¾░úø "
Alpine = "¯İá "
Amazon = "¯İù"
Android = "¯İİ"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "¯İÁ "
CentOS = "¯İ¬ "
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø "
