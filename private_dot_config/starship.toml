[c]
symbol = "¯İŞ "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "¯Ş¿ "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "¯İĞ "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "¯£¢ "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "¯£© "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "¯İ┤ "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "¯İş "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "¯£╝ "
style = "bg:color_blue"
format = '[[ $symbol($version)(\($virtualenv\)) ](fg:color_fg0 bg:color_blue)]($style)'

[lua]
symbol = "¯İá "
style = "bg:color_blue"
format = '[[ $symbol($version) ](fg:color_fg0 bg:color_blue)]($style)'
version_format = 'v${raw}'
detect_extensions = ['lua']
detect_files = ['.lua-version']
lua_binary = 'lua'

# ÔöÇÔöÇ Containers & Packages ÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇÔöÇ

[docker_context]
symbol = "´îê "
style = "bg:color_bg3"
format = '[[ $symbol($context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol($environment) ](fg:#83a598 bg:color_bg3)]($style)'

[container]
symbol = "´ÆÀ "
style = "bg:color_bg3"
format = '[$symbol \[$name\]]($style) '

[package]
symbol = "¾░Åù "
style = "bg:color_bg3"
format = '[[ $symbol$version ](fg:#83a598 bg:color_bg3)]($style)'


[kubernetes]
disabled = false
symbol = "¾▒â¥ "
style = "bg:color_bg3"
format = '[[ $symbol$context(:$namespace) ](fg:#83a598 bg:color_bg3)]($style)'
detect_folders = ['charts', 'helmfile.d']
detect_files = ['helmfile.yaml', 'Chart.yaml']
detect_env_vars = ['KUBECONFIG']

[aws]
disabled = false
symbol = "¾░©Å "
style = "bg:color_bg3"
format = '[[ $symbol$profile($region) ](fg:#83a598 bg:color_bg3)]($style)'

[gcloud]
